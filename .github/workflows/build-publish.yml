name: ci-eval-platforms

on:
  push:
    branches:
      - 'main'
  schedule:
    - cron: '0 0 1 * *' # Monthly maintenance rebuild
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Login to DockerHub
        uses: docker/login-action@v4 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push - WooCommerce
        id: docker_build_woocommerce
        uses: docker/build-push-action@v7
        continue-on-error: true
        with:
          context: ./woocommerce/
          push: true
          tags: acromedia/ecommerce:woocommerce
      -
        name: Build and push - OpenCart
        id: docker_build_opencart
        uses: docker/build-push-action@v7
        continue-on-error: true
        with:
          context: ./opencart/
          push: true
          tags: acromedia/ecommerce:opencart
      -
        name: Build and push - SpreeCommerce
        id: docker_build_spree
        uses: docker/build-push-action@v7
        continue-on-error: true
        with:
          context: ./spree/
          push: true
          tags: acromedia/ecommerce:spree
      -
        name: Build and push - Medusa
        id: docker_build_medusa
        uses: docker/build-push-action@v7
        continue-on-error: true
        with:
          context: ./medusa/
          push: true
          tags: acromedia/ecommerce:medusa
      -
        name: Update repo description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: acromedia/ecommerce